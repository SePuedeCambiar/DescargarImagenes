<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Esta línea es la que permite que las imágenes de las Boorus se vean en la UI -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src * blob:; script-src 'self'; style-src 'self' 'unsafe-inline';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waifu Grabber Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- HEADER: Búsqueda y Filtros -->
        <header>
            <h1>🌸 Waifu <span>Grabber</span></h1>
            
            <div class="search-section">
                <div class="input-group">
                    <!-- El atributo list conecta este input con el datalist de abajo -->
                    <input type="text" id="tagName" placeholder="Nombre del personaje / Tag..." list="tagSuggestions">
                    <select id="mode">
                        <option value="nsfw">🔥 NSFW</option>
                        <option value="sfw">🌸 SFW</option>
                    </select>
                    <button id="btnSearch">Buscar</button>
                </div>

                <div class="filters">
                    <!-- Los checkboxes de fuentes se generan dinámicamente aquí desde main.js -->
                    <div class="page-control">
                        <span>Página:</span>
                        <input type="number" id="pageNumber" value="1" min="1">
                    </div>
                </div>
            </div>

            <!-- 🚀 SECCIÓN DE FILTROS AVANZADOS (Módulo B) -->
            <div class="advanced-filters">
                <!-- FILA 1: Denylist -->
                <div class="filter-group">
                    <label for="denylistInput">🚫 Denylist (Tags a excluir, separados por coma):</label>
                    <input type="text" id="denylistInput" placeholder="blur, lowres, watermark, text...">
                </div>

                <!-- FILA 2: Configuración de API (Para Autocompletado rápido) -->
                <div class="filter-group">
                    <label for="apiKey">🔑 Danbooru API Key (Opcional para autocompletado):</label>
                    <input type="password" id="apiKey" placeholder="Introduce tu API Key aquí...">
                </div>
                
                <!-- FILA 3: Categorías -->
                <div class="filter-group">
                    <label>✨ Categorías rápidas (Añadir a la búsqueda):</label>
                    <div id="categoryToggles" class="category-chips">
                        <!-- Los chips se generan dinámicamente desde main.js -->
                    </div>
                </div>
            </div>
        </header>

        <!-- CONTROLES GLOBALES: Solo aparecen al haber resultados -->
        <div id="globalControls" class="global-controls hidden">
            
            <!-- Fila para la selección de carpeta -->
            <div class="folder-selection">
                <button id="btnSelectFolder" class="btn-secondary">📁 Seleccionar Carpeta</button>
                <span id="currentPathText" class="path-text">./downloads</span>
            </div>

            <div class="action-buttons">
                <button id="btnDownloadPage" class="btn-secondary">📥 Descargar Página</button>
                <div class="bulk-download">
                    <span>Hasta pág:</span>
                    <input type="number" id="untilPage" value="1" min="1">
                    <button id="btnDownloadUntil" class="btn-secondary">🚀 Descarga Masiva</button>
                </div>
                <button id="btnClearLogs" class="btn-danger">🧹 Limpiar Hashes</button>
            </div>
            
            <div id="statusText" class="status-text">Listo para descargar</div>
        </div>

        <!-- GRID DE RESULTADOS -->
        <div id="resultsGrid" class="results-grid">
            <!-- Aquí se cargarán las imágenes dinámicamente -->
            <div class="placeholder-text">Ingresa un nombre y presiona buscar...</div>
        </div>
    </div>

    <!-- 🚀 ELEMENTO CRÍTICO PARA EL AUTOCOMPLETADO -->
    <!-- Este elemento es invisible, pero es donde JS inserta las opciones de tags -->
    <datalist id="tagSuggestions"></datalist>

    <!-- Cargamos el orquestador del frontend como módulo -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
