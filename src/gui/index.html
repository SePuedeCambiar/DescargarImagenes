<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Política de seguridad para permitir imágenes de Boorus y scripts locales -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src * blob:; script-src 'self'; style-src 'self' 'unsafe-inline';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waifu Grabber Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- HEADER PRINCIPAL -->
        <header>
            <div class="header-main">
                <h1>🌸 Waifu <span>Grabber</span></h1>
                <!-- Botón para ocultar y mostrar los paneles de control -->
                <button id="btnToggleControls" class="btn-toggle">⚙️ Opciones y Filtros</button>
            </div>
            
            <!-- PANEL COLAPSABLE -->
            <div id="controlsWrapper" class="controls-wrapper">
                
                <!-- Búsqueda y Filtros Básicos -->
                <div class="search-section">
                    <div class="input-group">
                        <input type="text" id="tagName" placeholder="Nombre del personaje / Tag..." list="tagSuggestions">
                        <select id="mode">
                            <option value="nsfw">🔥 NSFW</option>
                            <option value="sfw">🌸 SFW</option>
                        </select>
                        <button id="btnSearch">Buscar</button>
                    </div>

                    <div class="filters">
                        <div class="page-control">
                            <span>Página:</span>
                            <input type="number" id="pageNumber" value="1" min="1">
                        </div>
                    </div>
                </div>

                <!-- Filtros Avanzados -->
                <div class="advanced-filters">
                    <div class="filter-group">
                        <label for="denylistInput">🚫 Denylist (Tags a excluir):</label>
                        <input type="text" id="denylistInput" placeholder="blur, lowres, watermark...">
                    </div>

                    <div class="filter-group">
                        <label for="apiKey">🔑 Danbooru API Key:</label>
                        <input type="password" id="apiKey" placeholder="Introduce tu API Key...">
                    </div>
                    
                    <div class="filter-group">
                        <label>✨ Categorías rápidas:</label>
                        <div id="categoryToggles" class="category-chips">
                            <!-- Chips generados dinámicamente -->
                        </div>
                    </div>
                </div>

                <!-- Controles Globales de Descarga (integrados en el colapsable) -->
                <div id="globalControls" class="global-controls hidden">
                    <div class="folder-selection">
                        <button id="btnSelectFolder" class="btn-secondary">📁 Seleccionar Carpeta</button>
                        <span id="currentPathText" class="path-text">./downloads</span>
                    </div>

                    <div class="action-buttons">
                        <button id="btnDownloadPage" class="btn-secondary">📥 Descargar Página</button>
                        <div class="bulk-download">
                            <span>Hasta pág:</span>
                            <input type="number" id="untilPage" value="1" min="1">
                            <button id="btnDownloadUntil" class="btn-secondary">🚀 Descarga Masiva</button>
                        </div>
                        <button id="btnClearLogs" class="btn-danger">🧹 Limpiar Hashes</button>
                    </div>
                    
                    <div id="statusText" class="status-text">Listo para descargar</div>
                </div>

            </div>
        </header>

        <!-- GRID DE RESULTADOS -->
        <div id="resultsGrid" class="results-grid">
            <div class="placeholder-text">Ingresa un nombre y presiona buscar...</div>
        </div>
    </div>

    <!-- VISUALIZADOR DE IMÁGENES (LIGHTBOX) -->
    <div id="lightbox" class="lightbox hidden">
        <!-- Botón de cerrar -->
        <span id="closeLightbox" class="lightbox-close">&times;</span>
        
        <!-- Contador de imagen -->
        <div id="lightboxCounter" class="lightbox-counter">1 / 1</div>

        <!-- Contenedor de la imagen -->
        <div class="lightbox-content">
            <img id="lightboxImg" src="" alt="Full View">
        </div>

        <!-- Barra de navegación inferior -->
        <div class="lightbox-nav">
            <!-- Botón Anterior -->
            <button id="btnPrev" class="nav-btn">⬅️</button>
            
            <!-- Controles de Slideshow -->
            <div class="slideshow-controls">
                <button id="btnSlideshow" class="btn-secondary">▶️ Auto</button>
                <div class="interval-group">
                    <span>Seg:</span>
                    <input type="number" id="slideshowInterval" value="3" min="1" max="60">
                </div>
            </div>

            <!-- Botón Siguiente -->
            <button id="btnNext" class="nav-btn">➡️</button>
        </div>
    </div>

    <!-- Datalist para autocompletado de tags -->
    <datalist id="tagSuggestions"></datalist>

    <!-- Scripts -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
